name: MATLAB Agent Harness CI
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  verify-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Create logs directory
        run: mkdir -p logs

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a 

      - name: Run Agent Tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(fullfile(pwd, 'harness'));
            addpath(genpath(pwd));
            rehash;
            results = runtests('tests/integration/test_agent_performance.m');
            display(results);
            assert(~isempty(results) && all([results.Passed]), 'Tests failed or were not found');
