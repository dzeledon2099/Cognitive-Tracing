name: MATLAB Agent Harness CI

on: [push, pull_request]

jobs:
  verify-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a 

      - name: Run Agent Tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            % Automatically find and run all tests in the repository
            try
                results = runtests(pwd, 'IncludeSubfolders', true);
                display(results);
                assert(~isempty(results) && ~any([results.Failed]));
            catch ME
                disp(ME.getReport);
                exit(1);
            end
