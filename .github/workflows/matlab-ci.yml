name: MATLAB Agent Harness CI
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  verify-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a 
      - name: Run Agent Tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            % 1. Setup Pathing
            addpath(pwd);
            addpath(genpath('harness'));
            addpath(genpath('tests'));
            savepath;
            
            % 2. Debug: List files so we can see them in the Action logs
            fprintf('--- Current Directory Contents ---\n');
            dir('tests/integration')
            
            % 3. Run by Filename to bypass suite discovery issues
            try
                results = runtests('tests/integration/test_agent_performance.m');
                display(results);
                if isempty(results) || any([results.Failed])
                    exit(1);
                end
            catch ME
                fprintf('Critical Error: %s\n', ME.message);
                exit(1);
            end
